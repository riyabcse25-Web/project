<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brew & Bean Café</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }
    h2 {
      text-align: center;
    }
    .summary {
      margin-top: 20px;
      padding: 10px;
      background: #eee;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Brew & Bean Café ☕</h2>

  <form id="orderForm">

    <!-- Coffee Type -->
    <label>Select Coffee:</label><br>
    <select id="coffee" onchange="updateOrder()">
      <option value="100">Espresso (₹100)</option>
      <option value="150">Cappuccino (₹150)</option>
      <option value="180">Latte (₹180)</option>
      <option value="120">Americano (₹120)</option>
      <option value="200">Mocha (₹200)</option>
      <option value="160">Macchiato (₹160)</option>
      <option value="170">Flat White (₹170)</option>
      <option value="190">Affogato (₹190)</option>
      <option value="140">Cold Brew (₹140)</option>
      <option value="220">Frappuccino (₹220)</option>
    </select><br><br>

    <!-- Add-ons -->
    <label>Add-ons:</label><br>
    <input type="checkbox" value="20" onchange="updateOrder()"> Extra Sugar (₹20)<br>
    <input type="checkbox" value="30" onchange="updateOrder()"> Whipped Cream (₹30)<br>
    <input type="checkbox" value="40" onchange="updateOrder()"> Chocolate Syrup (₹40)<br><br>

    <!-- Quantity -->
    <label>Quantity:</label><br>
    <input type="number" id="qty" value="1" min="1" onchange="updateOrder()"><br><br>

  </form>

  <!-- Order Summary -->
  <div class="summary">
    <h3>Order Summary</h3>
    <p id="summaryText">Select your order</p>
    <h3>Total: ₹<span id="total">0</span></h3>
  </div>
</div>

<script>
function updateOrder() {
  let coffee = document.getElementById("coffee");
  let coffeePrice = parseInt(coffee.value);
  let coffeeName = coffee.options[coffee.selectedIndex].text;

  let checkboxes = document.querySelectorAll("input[type='checkbox']");
  let addons = [];
  let addonTotal = 0;

  checkboxes.forEach(cb => {
    if (cb.checked) {
      addons.push(cb.parentElement.textContent.trim());
      addonTotal += parseInt(cb.value);
    }
  });

  let qty = parseInt(document.getElementById("qty").value);

  let total = (coffeePrice + addonTotal) * qty;

  document.getElementById("summaryText").innerHTML =
    "Coffee: " + coffeeName + "<br>" +
    "Add-ons: " + (addons.length ? addons.join(", ") : "None") + "<br>" +
    "Quantity: " + qty;

  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
