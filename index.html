<!DOCTYPE html>
<html lang="en">
<head>
  
    <title>Brew & Bean Café</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

   
    <div class="container">

    
        <h2>Brew & Bean Café </h2>

  
        <form id="orderForm">

           
            <label for="coffee">Select Coffee:</label><br>
            <select id="coffee">
                <option value="100">Espresso (₹100)</option>
                <option value="150">Cappuccino (₹150)</option>
                <option value="180">Latte (₹180)</option>
            </select><br><br>

           
            <label>Add-ons:</label><br>
            <input type="checkbox" value="20"> Extra Sugar (₹20)<br>
            <input type="checkbox" value="30"> Whipped Cream (₹30)<br>
            <input type="checkbox" value="40"> Chocolate Syrup (₹40)<br><br>


            <label for="qty">Quantity:</label><br>
            <input type="number" id="qty" value="1" min="1"><br><br>

        </form>

   
        <div class="summary">
            <h3>Order Summary</h3>
            <p id="summaryText">Your order details will appear here</p>
            <h3>Total: ₹<span id="total">0</span></h3>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
